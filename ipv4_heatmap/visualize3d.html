<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPv6 3D Visualization</title>
    <style>
        body {
            margin: 0;
            background: #050505;
            color: #fff;
            font-family: sans-serif;
            overflow: hidden;
        }

        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
        }

        #controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
        }

        #drop-zone {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            z-index: 100;
            border: 2px dashed #444;
        }

        #drop-zone.hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div id="info">
        <h3>IPv6 3D Point Cloud</h3>
        <div id="status">Please drop your .csv file here</div>
        <div id="stats"></div>
    </div>

    <div id="drop-zone">
        <h1>Drop ipv6_3d_9bit.csv here</h1>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, points;

        function init() {
            try {
                scene = new THREE.Scene();
                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
                camera.position.z = 800;

                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                document.body.appendChild(renderer.domElement);
            } catch (e) {
                document.getElementById('status').innerHTML = "<b style='color:red'>WebGL Error:</b> Your browser cannot create a 3D context. <br>Please check browser settings or use the Python visualizer.";
                console.error("WebGL Initialization failed", e);
                return;
            }

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const axesHelper = new THREE.AxesHelper(500);
            scene.add(axesHelper);

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // File Loading
        const dropZone = document.getElementById('drop-zone');

        window.addEventListener('dragover', (e) => e.preventDefault());
        window.addEventListener('drop', (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file) {
                loadFile(file);
            }
        });

        function loadFile(file) {
            dropZone.classList.add('hidden');
            document.getElementById('status').innerText = "Loading " + file.name + "...";

            const reader = new FileReader();
            reader.onload = function (e) {
                const text = e.target.result;
                processData(text);
            };
            reader.readAsText(file);
        }

        function processData(csv) {
            const lines = csv.split('\n');
            const positions = [];
            const colors = [];

            let minX = 1000, minY = 1000, minZ = 1000;
            let maxX = -1000, maxY = -1000, maxZ = -1000;

            // Skip header
            for (let i = 1; i < lines.length; i++) {
                const parts = lines[i].split(',');
                if (parts.length < 3) continue;

                const x = parseFloat(parts[0]);
                const y = parseFloat(parts[1]);
                const z = parseFloat(parts[2]);

                const px = x - 256;
                const py = y - 256;
                const pz = z - 256;

                positions.push(px, py, pz);

                // Better coloring: Use HSL to ensure points are always bright
                const color = new THREE.Color();
                color.setHSL((x + y + z) / (512 * 3), 0.8, 0.6);
                colors.push(color.r, color.g, color.b);

                if (px < minX) minX = px; if (px > maxX) maxX = px;
                if (py < minY) minY = py; if (py > maxY) maxY = py;
                if (pz < minZ) minZ = pz; if (pz > maxZ) maxZ = pz;
            }

            if (points) scene.remove(points);

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 5,   // Increased size
                vertexColors: true,
                transparent: false, // Solid points are easier to see
                sizeAttenuation: true
            });

            points = new THREE.Points(geometry, material);
            scene.add(points);

            // Auto-target the camera to the data cluster
            const centerX = (minX + maxX) / 2;
            const centerY = (minY + maxY) / 2;
            const centerZ = (minZ + maxZ) / 2;
            controls.target.set(centerX, centerY, centerZ);
            camera.position.set(centerX, centerY, centerZ + 600);
            controls.update();

            document.getElementById('status').innerText = "Loaded " + (lines.length - 1) + " points";
            document.getElementById('stats').innerText = `Cluster bounds: X[${minX.toFixed(0)},${maxX.toFixed(0)}] Y[${minY.toFixed(0)},${maxY.toFixed(0)}] Z[${minZ.toFixed(0)},${maxZ.toFixed(0)}]`;
        }

        init();
    </script>
</body>

</html>
