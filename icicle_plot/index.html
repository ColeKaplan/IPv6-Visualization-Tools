<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>IP Address Space Icicle Plot</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
</head>
<body>
  <h1>IPv6 Icicle Plot</h1>
  <p id="subtitle">Prefix hierarchy: /32 → /48 → /64. Width = block size. Color = activity density.</p>
  <p id="subtitle2">Takes a few seconds to load. Please wait.</p>

  <div id="controls">
    <button id="btn-ipv6">Load IPv6</button>
    <button id="btn-ipv4">Load IPv4</button>
    <button id="btn-reset" style="display:none">&#8617; Reset</button>
  </div>

  <p id="breadcrumb"></p>
  <p id="status">Press a button to load data.</p>

  <canvas id="chart"></canvas>
  <div id="tooltip"></div>

  <script src="icicle.js"></script>
</body>
</html>
